name: ✨ Feature Request
description: Propose an enhancement or new feature for Dinov2-ISIC
title: "[Feature]: "
labels: ["enhancement"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        Thanks for sharing your idea! Please fill out the sections below so we can understand and evaluate your proposal.

  - type: checkboxes
    id: checklist
    attributes:
      label: Pre-request checklist
      options:
        - label: I have searched existing issues to avoid duplicates
          required: true
        - label: This is a new feature, not a bug (use Bug Report for bugs)
          required: true

  - type: textarea
    id: problem
    attributes:
      label: Problem statement
      description: Is your feature request related to a problem? What pain point does it address?
      placeholder: "It's hard to evaluate model performance because there's no built-in support for generating a full classification report on a custom test set."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: Describe the solution you'd like to see implemented.
      placeholder: "Add a `/evaluate` endpoint that accepts a test dataset and returns accuracy, per-class metrics, and a confusion matrix."
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Describe any alternative solutions or workarounds you've considered.
      placeholder: "I considered running the Kaggle test script manually, but an integrated endpoint would be much more convenient."
    validations:
      required: false

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What's in scope and out of scope for this feature?
      placeholder: |
        In scope:
        - Endpoint to run evaluation on an uploaded test set
        - JSON + image outputs

        Out of scope:
        - Training new models
        - Multi-label classification
    validations:
      required: false

  - type: textarea
    id: risks
    attributes:
      label: Risks / trade-offs
      description: What are the potential risks, downsides, or trade-offs of this feature?
      placeholder: "Larger memory usage when loading test sets; may need an async background job for large datasets."
    validations:
      required: false

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context, mockups, diagrams, or references.
      placeholder: "This would complement the existing `/predict` endpoint and the test script in kaggle/test_kaggle.py."
    validations:
      required: false

  - type: checkboxes
    id: willing
    attributes:
      label: Are you willing to contribute this feature?
      options:
        - label: Yes, I can open a PR for this feature
        - label: I can help test the feature
        - label: I can provide more details / feedback
        - label: No, I'm just suggesting the idea
